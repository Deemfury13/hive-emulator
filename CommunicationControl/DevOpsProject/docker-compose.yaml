version: "3.9"
name: kpi-hive

services:
  redis:
    image: redis:alpine
    container_name: redis-server
    restart: always
    ports:
      - "6379:6379"
    networks:
      - hive-network

  communication-control:
    image: deemfury/communication-control:latest
    container_name: backend-service
    restart: always
    environment:
      - ConnectionStrings__Redis=redis-server:6379
      - Redis__ConnectionString=redis-server:6379
    ports:
      - "8080:8080"
    networks:
      - hive-network

  map-client:
    image: deemfury/map-client:latest
    container_name: frontend-service
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./config.json:/usr/share/nginx/html/config.json:ro
    networks:
      - hive-network

networks:
  hive-network: