version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis-server
    ports:
      - "6379:6379"
    restart: always

  backend-service:
    image: deemfury/communication-control:latest
    container_name: backend-service
    ports:
      - "5000:8080"
    depends_on:
      - redis
    restart: always

  frontend-service:
    image: deemfury/map-client:latest
    container_name: